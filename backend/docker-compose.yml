version: '3.9'
services:
  api:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./tmp:/app/tmp
    environment:
      - NODE_ENV=development
    networks:
      - pharmastock

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pharma_db
      POSTGRES_USER: pharma
      POSTGRES_PASSWORD: pharmapass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmastock

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmastock

volumes:
  pg_data:

networks:
  pharmastock:
    driver: bridge
